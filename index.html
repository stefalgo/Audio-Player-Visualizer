<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Audio Player and Visualizer">

    <meta property="og:title" content="Audio Visualizer and Player">
    <meta property="og:description" content="Audio Player and Visualizer">
    <meta property="og:image" content="https://stefalgo.github.io/Audio-Player-Visualizer/Media/Icon2.png">
    <meta property="og:url" content="https://stefalgo.github.io/Audio-Player-Visualizer/">
    <meta property="og:type" content="website">

    <title>Audio Visualizer</title>
    <link rel="icon" href="./Media/Icon2.png" type="image/png">
    <link rel="stylesheet" href="./CSS/stylesheet.css" type="text/css">
    <script src="./JS/Classes.js" defer></script>
    <script src="./JS/RenderVis.js" defer></script>
    <script src="./JS/index.js" defer></script>
</head>

<body>
    <div style="z-index: 5; position: fixed;">
        <a href="https://github.com/stefalgo" target="_blank" class="githubProfile">
            <img src="https://github.com/stefalgo.png">
            Github Profile
        </a>
        <a href="https://github.com/stefalgo/Audio-Player-Visualizer" target="_blank" class="githubProfile">
            <img src="./Media/GitHub_Invertocat_White.png">
            Project Page
        </a>
    </div>
    <div id="eq-sliders" class="movable-window" style="display: none;">
        <div class="window-topbar">イコライザーエディター</div>
        <div style="display: flex; flex-direction: row;">
            <button class="button" id="eqResetBtn" style="margin-left: 10px;">Flat</button>
            <select id="eqPresetSelect" data-tip="Presets" style="margin-left: 10px;"></select>
            <button class="button" id="eqPresetSetBtn">Set preset</button>
            <button class="button" id="eqPresetSaveBtn" style="margin-left: 10px;">Save preset</button>
            <button class="button" id="eqPresetRemoveBtn">Delete preset</button>
        </div>
        <div style="padding: 3px;">
            <canvas id="eq"></canvas>
        </div>
    </div>

    <div id="SubtitlesList" class="movable-window" style="display: none;">
        <div class="window-topbar">字幕トラック</div>
        <div style="display: flex; flex-direction: row;">
            <button class="button" id="subUnloadSubBtn" style="margin-left: 10px;">Unload current subtitle</button>
            <button class="button" id="subAutoFindBtn" style="margin-left: 10px;">Auto select subtitle</button>
            <input type="file" id="subtitleFile" multiple accept=".srt,.vtt">
            <label for="subtitleFile" id="ChoosesubtitleFileLabel" class="button" data-tip="srt/vtt" style="margin-left: 10px;">Choose a subtitle file...</label>
        </div>
        <input style="margin: 3px;" type="text" id="subSearch" class="button searchBar" placeholder="字幕検索">
        <div style="padding: 3px; margin-top: 5px;" id="SubtitlesList-Container"></div>
    </div>

    <div id="SongList" class="movable-window" style="display: none;">
        <div class="window-topbar">オーディオトラック</div>
        <div style="display: flex; flex-direction: row; justify-content: space-between;">
            <span style="padding: 3px;" id="songList-totalPlayTime">Total: 00:00:00 | Avg: 00:00:00</span>
            <button id="removeAllSounds" class="button" style="margin-right: 10px;">クリア</button>
        </div>
        <input style="margin: 3px;" type="text" id="songSearch" class="button searchBar" placeholder="オーディオ検索">
        <div style="padding: 3px; margin-top: 5px;" id="SongList-Container"></div>
    </div>

    <div id="SubtitlesOptions" class="movable-window" style="display: none;">
        <div class="window-topbar">字幕設定</div>
        <div style="padding: 10px;">
            <div style="margin-bottom: 12px;">
                <label for="subtitleOffset">字幕オフセット (ms)</label><br>
                <input class="button" type="number" id="subtitleOffset" value="0" step="100" style="width: 120px;">
                <div style="font-size: 12px;">
                    Positive values delay subtitles, negative values show them earlier.
                </div>
            </div>
            <div style="margin-bottom: 12px;">
                <label for="subtitleFont">フォント</label><br>
                <select id="subtitleFont">
                    <option value="default" selected>Default</option>
                    <option value="Arial, sans-serif">Arial</option>
                    <option value="Verdana, sans-serif">Verdana</option>
                    <option value="Tahoma, sans-serif">Tahoma</option>
                    <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
                    <option value="'Times New Roman', serif">Times New Roman</option>
                    <option value="Georgia, serif">Georgia</option>
                    <option value="'Courier New', monospace">Courier New</option>

                    <option value="system-ui, 'Noto Sans JP', sans-serif">System UI Noto Sans JP</option>
                    <option value="'Noto Sans JP', sans-serif">Noto Sans JP</option>
                    <option value="'Hiragino Sans', 'Noto Sans JP', sans-serif">Hiragino Sans</option>
                </select>
            </div>
            <div style="margin-bottom: 12px;">
                <label for="subtitleFontSize">フォントサイズ</label><br>
                <input class="button" type="number" id="subtitleFontSize" value="18" min="8" max="100">
                px
            </div>
            <div style="margin-bottom: 12px;">
                <label style="display: flex;">
                    <input class="checkbox" type="checkbox" id="subtitlePlainStyle">
                    標準スタイルを使用（HTMLタグを無効化）
                </label>
            </div>
        </div>
    </div>

    <div id="Subtitles" class="movable-window" style="display: none;">
        <div class="window-topbar" id="subtitle-title">字幕</div>
        <div style="padding: 3px;" class="subtitle-container">
            <h3 id="subtitleText" style="font-size: 18px;">Subtitle text will apear here</h3>
        </div>
    </div>

    <div id="controls">
        <div class="controls-container">
            <div style="height: 25px; display: flex; flex-direction: row; align-items: center;">
                <input type="file" id="audioFile" accept="audio/*,video/*" multiple>
                <label for="audioFile" id="ChooseaudioFileLabel" data-tip="mp3/wav/m4a/ogg/flac/opus/wma/aiff/oga/midi/au">Choose a file...</label>
            </div>
            <div style="display: flex; margin-top: 5px;">
                <button id="loopModeBtn" class="button"></button>
                <button id="playModeBtn" class="button"></button>
            </div>

            <div class="Viz-Settings">
                <label for="visualizerMF">Visualizer max frequency</label>
                <input type="range" data-tip="Visualizer max frequency: x Hz" id="visualizerMF" class="slider" min="1000" max="16000" value="16000" step="100">
                <br>
                <label for="visualizerQL">Visualizer quality</label>
                <input type="range" data-tip="Visualizer quality: x fftSize" id="visualizerQL" class="slider" min="1" max="4" value="2" step="1">
                <br>
                <label for="visualizerSL">Visualizer smoothing</label>
                <input type="range" data-tip="Visualizer smoothing: x%" id="visualizerSL" class="slider" min="0" max="0.9" value="0.8" step="0.1">
                <div style="display: flex; flex-direction: row;">
                    <label for="vizPauseVizBtn">Pause render</label>
                    <input data-tip="Pause Visualizer" type="checkbox" id="vizPauseVizBtn" class="checkbox">
                </div>
                <select id="visualizerType" data-tip="Visualizer type">
                    <option value="bar">Bar</option>
                    <option value="retro" selected>Retro</option>
                    <option value="waterfall">Waterfall</option>
                    <option value="waveform">Waveform</option>
                    <option value="soundTrace">Draw Sound Trace</option>
                </select>
            </div>

            <div class="playback-container">
                <span id="audio-currentTime" class="segment14">00 : 00 : 00 . 000 / 00 : 00 : 00 . 000</span>
                <div style="display: flex; flex-direction: row; align-items: center;">
                    <button id="topListBtn" class="button"></button>
                    <button id="play-previous-button" class="button"></button>
                    <button id="pause-play-button" class="button" data-state="play"></button>
                    <button id="play-next-button" class="button"></button>
                    <button id="play-next-random-button" class="button"></button>
                </div>
                <input type="range" data-tip="Time" id="timeSlider" class="slider time" min="0" max="1" value="0" step="0.001">
                <input type="number" data-tip="Playback speed" id="playback-speed" class="button" min="0.1" max="2" value="1" step="0.05" style="width: 100px;">
            </div>

            <span id="audio-volume">Volume: xx dB</span>
            <input type="range" id="volumeSlider" data-tip="Volume" class="slider" min="0" max="2" value="0.5" step="0.01">
            <div style="display: flex; flex-direction: row; align-items: center;">
                <input type="button" id="songListBtn" class="button" value="オーディオトラック">
                <input type="button" id="subListBtn" class="button" value="字幕トラック" style="margin-left: 5px;">
                <input type="button" id="eqBtn" class="button" value="イコライザーエディター" style="margin-left: 5px;">
                <input type="button" id="subBtn" class="button" value="字幕" style="margin-left: 5px;">
                <input type="button" id="subOptionsBtn" class="button" value="字幕設定" style="margin-left: 5px;">
            </div>
        </div>
    </div>

    <div id="container">
        <canvas id="visualizer"></canvas>
    </div>
</body>

</html>
